name: Update fixtures

on:
  schedule:
    - cron: '0 19 * * *'   # ~6am Sydney
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install curl_cffi

      # --- Burwood ---
      - name: Generate Burwood
        run: |
          python3 dribl_to_ics.py \
            --tenant JR1K3RNQ9M \
            --season k2KpooqNY5 \
            --club 3yvdWENO05 \
            --competition R1K3BBXLNQ \
            --league BdDDYpGwdb \
            --team am1QPnXjmw \
            --calname "Burwood FC 45 05" \
            --out burwood.ics

      - name: Detect Burwood changes
        id: check_burwood
        run: |
          if git show HEAD:burwood.ics 2>/dev/null | grep -v '^DTSTAMP' > /tmp/old.ics; then
            grep -v '^DTSTAMP' burwood.ics > /tmp/new.ics
            if diff -q /tmp/old.ics /tmp/new.ics > /dev/null; then
              echo "changed=false" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi
          echo "changed=true" >> $GITHUB_OUTPUT

      # --- Easts ---
      - name: Generate Easts PISA
        run: |
          python3 dribl_to_ics.py \
            --tenant GwxNxOmkpO \
            --season 3pmvLyLKvJ \
            --club 8nm7P0kNOq \
            --team pN69xRgBm0 \
            --calname "Easts FC G09 Blue PISA" \
            --out easts_pisa.ics

      - name: Detect Easts changes
        id: check_easts
        run: |
          if git show HEAD:easts_pisa.ics 2>/dev/null | grep -v '^DTSTAMP' > /tmp/old.ics; then
            grep -v '^DTSTAMP' easts_pisa.ics > /tmp/new.ics
            if diff -q /tmp/old.ics /tmp/new.ics > /dev/null; then
              echo "changed=false" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi
          echo "changed=true" >> $GITHUB_OUTPUT

      # --- Commit + notify ---
      - name: Commit if anything changed
        if: steps.check_burwood.outputs.changed == 'true' || steps.check_easts.outputs.changed == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add burwood.ics easts_pisa.ics
          git commit -m "Update fixtures $(date -u +%Y-%m-%d)"
          git push

      - name: Notify Burwood subscribers
        if: steps.check_burwood.outputs.changed == 'true'
        run: |
          curl -H "Title: Burwood FC 45 05 fixtures updated" \
               -H "Tags: soccer" \
               -d "Fixture list changed — check calendar" \
               ntfy.sh/${{ secrets.NTFY_TOPIC_BURWOOD }}

      - name: Notify Easts subscribers
        if: steps.check_easts.outputs.changed == 'true'
        run: |
          curl -H "Title: Easts FC G09 Blue PISA fixtures updated" \
               -H "Tags: soccer" \
               -d "Fixture list changed — check calendar" \
               ntfy.sh/${{ secrets.NTFY_TOPIC_EASTS }}
