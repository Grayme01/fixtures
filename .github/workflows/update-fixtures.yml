name: Update fixtures

on:
  schedule:
    - cron: '0 19 * * *'   # ~6am Sydney
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install curl_cffi

      # --- Burwood 45 05 (CDSFA) ---
      - name: Snapshot Burwood 45 05 (HEAD)
        run: |
          git show HEAD:burwood.ics > /tmp/old_burwood.ics 2>/dev/null || : > /tmp/old_burwood.ics

      - name: Generate Burwood 45 05
        run: |
          python3 dribl_to_ics.py \
            --tenant JR1K3RNQ9M \
            --season k2KpooqNY5 \
            --club 3yvdWENO05 \
            --competition R1K3BBXLNQ \
            --league BdDDYpGwdb \
            --team am1QPnXjmw \
            --calname "Burwood FC 45 05" \
            --match-url-base "https://cdsfa.dribl.com/matchcentre?m=" \
            --out burwood.ics

      - name: Diff Burwood 45 05
        id: diff_burwood
        run: |
          # Commit decision: any non-DTSTAMP difference
          if [ -s /tmp/old_burwood.ics ]; then
            grep -v '^DTSTAMP' /tmp/old_burwood.ics > /tmp/old_burwood_clean
            grep -v '^DTSTAMP' burwood.ics > /tmp/new_burwood_clean
            if diff -q /tmp/old_burwood_clean /tmp/new_burwood_clean > /dev/null; then
              echo "changed=false" >> $GITHUB_OUTPUT
            else
              echo "changed=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
          # Notify decision: semantic diff (time/ground/match/added/removed)
          body=$(python3 diff_ics.py --old /tmp/old_burwood.ics --new burwood.ics)
          if [ -z "$body" ]; then
            echo "notify=false" >> $GITHUB_OUTPUT
          else
            echo "notify=true" >> $GITHUB_OUTPUT
            delim=$(openssl rand -hex 12)
            {
              echo "body<<$delim"
              echo "$body"
              echo "$delim"
            } >> $GITHUB_OUTPUT
          fi

      # --- Burwood 45 03 ---
      - name: Snapshot Burwood 45 03 (HEAD)
        run: |
          git show HEAD:burwood_45_03.ics > /tmp/old_burwood_45_03.ics 2>/dev/null || : > /tmp/old_burwood_45_03.ics

      - name: Generate Burwood 45 03
        run: |
          python3 dribl_to_ics.py \
            --tenant JR1K3RNQ9M \
            --season k2KpooqNY5 \
            --club 3yvdWENO05 \
            --team jdylv4ZDK5 \
            --calname "Burwood FC 45 03 (O45 Div 3)" \
            --match-url-base "https://cdsfa.dribl.com/matchcentre?m=" \
            --out burwood_45_03.ics

      - name: Diff Burwood 45 03
        id: diff_burwood_45_03
        run: |
          if [ -s /tmp/old_burwood_45_03.ics ]; then
            grep -v '^DTSTAMP' /tmp/old_burwood_45_03.ics > /tmp/old_clean
            grep -v '^DTSTAMP' burwood_45_03.ics > /tmp/new_clean
            if diff -q /tmp/old_clean /tmp/new_clean > /dev/null; then
              echo "changed=false" >> $GITHUB_OUTPUT
            else
              echo "changed=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
          body=$(python3 diff_ics.py --old /tmp/old_burwood_45_03.ics --new burwood_45_03.ics)
          if [ -z "$body" ]; then
            echo "notify=false" >> $GITHUB_OUTPUT
          else
            echo "notify=true" >> $GITHUB_OUTPUT
            delim=$(openssl rand -hex 12)
            {
              echo "body<<$delim"
              echo "$body"
              echo "$delim"
            } >> $GITHUB_OUTPUT
          fi

      # --- Easts PISA ---
      - name: Snapshot Easts PISA (HEAD)
        run: |
          git show HEAD:easts_pisa.ics > /tmp/old_easts_pisa.ics 2>/dev/null || : > /tmp/old_easts_pisa.ics

      - name: Generate Easts PISA
        run: |
          python3 dribl_to_ics.py \
            --tenant GwxNxOmkpO \
            --season 3pmvLyLKvJ \
            --club 8nm7P0kNOq \
            --team pN69xRgBm0 \
            --calname "Easts FC G09 Blue PISA" \
            --match-url-base "https://esfa.dribl.com/matchcentre?m=" \
            --home-prefix "🔵 " \
            --away-prefix "⚪ " \
            --out easts_pisa.ics

      - name: Diff Easts PISA
        id: diff_easts
        run: |
          if [ -s /tmp/old_easts_pisa.ics ]; then
            grep -v '^DTSTAMP' /tmp/old_easts_pisa.ics > /tmp/old_clean
            grep -v '^DTSTAMP' easts_pisa.ics > /tmp/new_clean
            if diff -q /tmp/old_clean /tmp/new_clean > /dev/null; then
              echo "changed=false" >> $GITHUB_OUTPUT
            else
              echo "changed=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
          body=$(python3 diff_ics.py --old /tmp/old_easts_pisa.ics --new easts_pisa.ics)
          if [ -z "$body" ]; then
            echo "notify=false" >> $GITHUB_OUTPUT
          else
            echo "notify=true" >> $GITHUB_OUTPUT
            delim=$(openssl rand -hex 12)
            {
              echo "body<<$delim"
              echo "$body"
              echo "$delim"
            } >> $GITHUB_OUTPUT
          fi

      # --- Commit + notify ---
      - name: Commit if any team's .ics changed
        if: steps.diff_burwood.outputs.changed == 'true' || steps.diff_burwood_45_03.outputs.changed == 'true' || steps.diff_easts.outputs.changed == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add burwood.ics burwood_45_03.ics easts_pisa.ics
          git commit -m "Update fixtures $(date -u +%Y-%m-%d)"
          git push

      - name: Notify Burwood 45 05 subscribers
        if: steps.diff_burwood.outputs.notify == 'true'
        env:
          BODY: ${{ steps.diff_burwood.outputs.body }}
          TOPIC: ${{ secrets.NTFY_TOPIC_BURWOOD }}
        run: |
          curl -H "Title: Burwood FC 45 05 fixtures updated" \
               -H "Tags: soccer" \
               --data-binary "$BODY" \
               "ntfy.sh/$TOPIC"

      - name: Notify Burwood 45 03 subscribers
        if: steps.diff_burwood_45_03.outputs.notify == 'true'
        env:
          BODY: ${{ steps.diff_burwood_45_03.outputs.body }}
          TOPIC: ${{ secrets.NTFY_TOPIC_BURWOOD_O45_DIV3 }}
        run: |
          curl -H "Title: Burwood FC 45 03 (O45 Div 3) fixtures updated" \
               -H "Tags: soccer" \
               --data-binary "$BODY" \
               "ntfy.sh/$TOPIC"

      - name: Notify Easts subscribers
        if: steps.diff_easts.outputs.notify == 'true'
        env:
          BODY: ${{ steps.diff_easts.outputs.body }}
          TOPIC: ${{ secrets.NTFY_TOPIC_EASTS }}
        run: |
          curl -H "Title: Easts FC G09 Blue PISA fixtures updated" \
               -H "Tags: soccer" \
               --data-binary "$BODY" \
               "ntfy.sh/$TOPIC"
