name: Update fixtures

on:
  schedule:
    - cron: '0 19 * * *'   # ~6am Sydney
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install curl_cffi

      - name: Burwood FC 45 05 (CDSFA)
        run: |
          python3 dribl_to_ics.py \
            --tenant JR1K3RNQ9M \
            --season k2KpooqNY5 \
            --club 3yvdWENO05 \
            --competition R1K3BBXLNQ \
            --league BdDDYpGwdb \
            --team am1QPnXjmw \
            --calname "Burwood FC 45 05" \
            --out burwood.ics

      - name: Easts FC G09 Blue PISA (ESFA)
        run: |
          python3 dribl_to_ics.py \
            --tenant GwxNxOmkpO \
            --season 3pmvLyLKvJ \
            --club 8nm7P0kNOq \
            --team pN69xRgBm0 \
            --calname "Easts FC G09 Blue PISA" \
            --out easts_pisa.ics

      - name: Commit if any fixture content changed
        id: commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          changed=false
          for f in burwood.ics easts_pisa.ics; do
            grep -v '^DTSTAMP' "$f" > "/tmp/new_$f"
            if git show "HEAD:$f" 2>/dev/null | grep -v '^DTSTAMP' > "/tmp/old_$f"; then
              if ! diff -q "/tmp/old_$f" "/tmp/new_$f" > /dev/null; then
                changed=true
              fi
            else
              # File didn't exist in HEAD — counts as changed
              changed=true
            fi
          done
          if [ "$changed" = "false" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No fixture changes."
            exit 0
          fi
          echo "changed=true" >> $GITHUB_OUTPUT
          git add burwood.ics easts_pisa.ics
          git commit -m "Update fixtures $(date -u +%Y-%m-%d)"
          git push

      - name: Notify via ntfy
        if: steps.commit.outputs.changed == 'true'
        run: |
          curl -H "Title: Fixtures updated" \
               -H "Tags: soccer" \
               -d "Fixture list changed — check calendar" \
               ntfy.sh/${{ secrets.NTFY_TOPIC }}
