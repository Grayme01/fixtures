name: Update fixtures

on:
  schedule:
    - cron: '0 19 * * *'   # ~6am Sydney
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install curl_cffi
      - run: python3 dribl_to_ics.py --out burwood.ics
      - name: Commit if fixture content changed
        id: commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          # Compare ignoring DTSTAMP lines (which change every run)
          if git show HEAD:burwood.ics 2>/dev/null | grep -v '^DTSTAMP' > /tmp/old.ics; then
            grep -v '^DTSTAMP' burwood.ics > /tmp/new.ics
            if diff -q /tmp/old.ics /tmp/new.ics > /dev/null; then
              echo "changed=false" >> $GITHUB_OUTPUT
              echo "No fixture changes."
              exit 0
            fi
          fi
          echo "changed=true" >> $GITHUB_OUTPUT
          git add burwood.ics
          git commit -m "Update fixtures $(date -u +%Y-%m-%d)"
          git push
      - name: Notify via ntfy
        if: steps.commit.outputs.changed == 'true'
        run: |
          curl -H "Title: Burwood fixtures updated" \
               -H "Tags: soccer" \
               -d "Fixture list changed — check calendar" \
               ntfy.sh/${{ secrets.NTFY_TOPIC }}
